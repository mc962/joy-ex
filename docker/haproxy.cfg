global
  log stdout format raw local0 info

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5s
  timeout client  30s
  timeout server  30s

# One frontend+backend per MLLP port. Add a new pair for each channel port.
# Only the Joy node currently running the channel will have the port open —
# HAProxy's health checks detect this and route accordingly (NLB pattern).
# inter 2s: check every 2s. fall 2: 2 failures to mark down. rise 1: 1 success
# to mark back up — fast recovery after Horde failover (~2-4s total).

frontend mllp_2575
  bind *:2575
  default_backend joy_mllp_2575

backend joy_mllp_2575
  option tcp-check
  server joy1 joy1:2575 check inter 2s rise 1 fall 2
  server joy2 joy2:2575 check inter 2s rise 1 fall 2
  server joy3 joy3:2575 check inter 2s rise 1 fall 2

# HAProxy stats UI — http://localhost:8404/stats
listen stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 3s
  stats show-legends
