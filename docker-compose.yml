# docker-compose.yml — Three-node Joy cluster for local development and HA testing.
#
# All joy nodes share the "joy" Docker network alias, so dns_cluster resolves
# "joy" → [joy1-IP, joy2-IP, joy3-IP] and connects the Erlang nodes automatically.
#
# Usage:
#   1. Build the image:       docker compose build
#   2. Run DB migrations:     docker compose run --rm joy1 bin/migrate
#   3. Start the cluster:     docker compose up
#
# To test a two-node cluster, comment out the joy3 service block below.
#
# Topology (mirrors a typical AWS deployment):
#   HAProxy    → NLB analog: TCP health-check routing for MLLP (port 2575)
#   Caddy      → ALB analog: HTTP/HTTPS reverse proxy for the admin UI
#   joy1/2/3   → EC2/ECS nodes
#   postgres   → RDS primary
#   postgres_replica → RDS read replica
#
# Web UI (direct node access for debugging):
#   Node 1: http://localhost:4000
#   Node 2: http://localhost:4001
#   Node 3: http://localhost:4002
#
# MLLP: send to HAProxy at localhost:2575 — it routes to whichever node is
#   running the channel. Kill a node mid-test to see Horde failover + HAProxy
#   reroute within ~2-4s. Watch the backend health at http://localhost:8404/stats
#
# To add a new MLLP channel port: add a frontend+backend pair to docker/haproxy.cfg
#   and expose the port from the haproxy service below.
#
# Secrets: copy this block to a .env file and fill in real values.
#   SECRET_KEY_BASE:  mix phx.gen.secret
#   ENCRYPTION_KEY:   :crypto.strong_rand_bytes(32) |> Base.encode64() |> IO.puts  (in iex)
#   RELEASE_COOKIE:   mix phx.gen.secret 32

x-joy-base: &joy-base
  build: .
  env_file: .env
  environment:
    PHX_HOST: "localhost"
    PHX_SERVER: "true"
    # dns_cluster will resolve "joy" → both container IPs via Docker network aliases below
    DNS_CLUSTER_QUERY: "joy"
    # Pool size per node — total DB connections = (POOL_SIZE + REPLICA_POOL_SIZE) × num_nodes
    POOL_SIZE: "5"
    REPLICA_POOL_SIZE: "3"

services:
  migrate:
    <<: *joy-base
    command: ["/app/bin/migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  joy1:
    <<: *joy-base
    ports:
      - "4000:4000"      # Web UI for node 1 (direct access)
      - "2575:2575"      # MLLP — routed via HAProxy (see haproxy service note below)
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres_replica:
        condition: service_started
    networks:
      joy_net:
        aliases:
          - joy            # All nodes answer to "joy" DNS → multi-A record discovery

  joy2:
    <<: *joy-base
    ports:
      - "4001:4000"      # Web UI for node 2 (direct access)
      - "2576:2575"      # MLLP — different host port because joy1 already owns 2575 on this host
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres_replica:
        condition: service_started
    networks:
      joy_net:
        aliases:
          - joy            # All nodes answer to "joy" DNS → multi-A record discovery

  # Comment out this block to test a two-node cluster instead.
  joy3:
    <<: *joy-base
    ports:
      - "4002:4000"      # Web UI for node 3 (direct access)
      - "2577:2575"      # MLLP — different host port because joy1/joy2 own 2575/2576
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres_replica:
        condition: service_started
    networks:
      joy_net:
        aliases:
          - joy            # All nodes answer to "joy" DNS → multi-A record discovery

  # ---------------------------------------------------------------------------
  # HAProxy — NLB analog for MLLP TCP load balancing.
  #
  # CURRENTLY COMMENTED OUT: replaced by a dedicated HAProxy LXC in the homelab
  # (192.168.1.200). That host runs the full `haproxy` Ansible role with active
  # TCP health checks and Let's Encrypt TLS termination for mllp.florence.place.
  #
  # Why different host ports (2575/2576/2577) on the joy nodes above?
  # HAProxy needs to address each Joy node independently to health-check them.
  # Since all three nodes run on the same host (kita, 192.168.1.99), they can't
  # all bind to the same host port — so each gets a unique one mapping to the
  # same container port 2575. The active Horde node accepts; the others refuse.
  # HAProxy sees this and routes only to the live node (balance first + tcp-check).
  #
  # Future: when kita gets an ethernet interface, switch to Docker macvlan so each
  # joy container gets its own LAN IP (192.168.1.201-203) and all use port 2575
  # uniformly. macvlan doesn't work on WiFi (wlp9s0) because the AP only forwards
  # traffic to one MAC address per client.
  #
  # To run locally without the homelab HAProxy: uncomment this block and revert
  # the joy port mappings to not expose 2575/2576/2577 on the host.
  #
  # haproxy:
  #   image: haproxy:3-alpine
  #   ports:
  #     - "2575:2575"      # MLLP (add more ports here as channels are added)
  #     - "8404:8404"      # HAProxy stats UI
  #   volumes:
  #     - ./docker/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
  #   depends_on:
  #     - joy1
  #     - joy2
  #     - joy3
  #   networks:
  #     - joy_net
  # ---------------------------------------------------------------------------

  postgres:
    image: docker.io/library/postgres:16-alpine
    env_file: .env
    ports:
      - "5532:5432"
    # Enable WAL streaming replication
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=64
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/primary-init.sh:/docker-entrypoint-initdb.d/01-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joy -d joy_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - joy_net

  # Streaming replica — clones primary on first start via pg_basebackup.
  # Remove REPLICA_DATABASE_URL from x-joy-env to disable replica routing in the app.
  # To verify replication: docker compose exec postgres_replica psql -U joy -d joy_prod -c "SELECT * FROM pg_stat_wal_receiver;"
  postgres_replica:
    image: docker.io/library/postgres:16-alpine
    env_file: .env
    ports:
      - "5533:5432"
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres
    entrypoint: ["bash", "/usr/local/bin/replica-entrypoint.sh"]
    volumes:
      - ./docker/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - joy_net

networks:
  joy_net:

volumes:
  postgres_data:
